<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0" stop-color="#18181b"/>
      <stop offset="1" stop-color="#09090b"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- top paddle (violet, P2) -->
  <rect x="146" y="118" width="220" height="34" rx="17" fill="#a78bfa" filter="url(#glow)"/>
  <!-- bottom paddle (emerald, P1) -->
  <rect x="146" y="360" width="220" height="34" rx="17" fill="#34d399" filter="url(#glow)"/>
  <!-- puck -->
  <circle cx="256" cy="256" r="40" fill="#fafafa" filter="url(#glow)"/>
</svg>
