<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RALLY" />
  <title>RALLY — two-thumb deflect duel</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --p1: #34d399;   /* emerald-400 — bottom player */
      --p2: #a78bfa;   /* violet-400  — top player   */
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      height: 100%;
      margin: 0;
      background: #09090b;
      color: #fafafa;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    #app { position: fixed; inset: 0; }
    canvas#game { display: block; width: 100%; height: 100%; touch-action: none; }

    .overlay { position: fixed; inset: 0; display: flex; }
    .hidden { display: none !important; }

    /* mirrored HUD panels for table play */
    .hud-panel { position: absolute; left: 0; right: 0; pointer-events: none; }
    .hud-top { top: 0; transform: rotate(180deg); }
    .hud-bottom { bottom: 0; }

    input[type="text"] { -webkit-appearance: none; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    /* fade/slide for menu chrome — respectful of reduced motion */
    .anim-in { animation: fadeUp .28s cubic-bezier(.16,1,.3,1) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .anim-in { animation: none; }
      * { scroll-behavior: auto; }
    }

    .seg { transition: color .15s ease, background-color .15s ease; }
  </style>
</head>

<body>
  <div id="app">
    <canvas id="game"></canvas>

    <!-- ======================= HUD (in-play, mirrored) ======================= -->
    <div id="hud" class="hidden">
      <!-- top player (rotated 180) -->
      <div class="hud-panel hud-top" style="padding-top: max(12px, var(--safe-t));">
        <div class="flex items-center justify-between px-5 pt-3">
          <div class="flex items-center gap-2">
            <span class="h-2.5 w-2.5 rounded-full" style="background: var(--p2); box-shadow: 0 0 10px var(--p2);"></span>
            <span id="hudName2" class="text-sm font-semibold text-zinc-300 max-w-[9rem] truncate">P2</span>
          </div>
          <div id="hudPips2" class="flex items-center gap-1.5"></div>
        </div>
        <div class="flex items-baseline justify-center gap-3">
          <span id="hudScore2" class="font-mono text-6xl font-extrabold tabular-nums" style="color: var(--p2);">0</span>
        </div>
      </div>
      <!-- bottom player -->
      <div class="hud-panel hud-bottom" style="padding-bottom: max(12px, var(--safe-b));">
        <div class="flex items-baseline justify-center gap-3">
          <span id="hudScore1" class="font-mono text-6xl font-extrabold tabular-nums" style="color: var(--p1);">0</span>
        </div>
        <div class="flex items-center justify-between px-5 pb-3">
          <div class="flex items-center gap-2">
            <span class="h-2.5 w-2.5 rounded-full" style="background: var(--p1); box-shadow: 0 0 10px var(--p1);"></span>
            <span id="hudName1" class="text-sm font-semibold text-zinc-300 max-w-[9rem] truncate">P1</span>
          </div>
          <div id="hudPips1" class="flex items-center gap-1.5"></div>
        </div>
      </div>

      <!-- pause button, center-edge so it's reachable but out of the way -->
      <button id="pauseBtn" aria-label="Pause"
        class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 grid h-11 w-11 place-items-center rounded-full border border-zinc-700/70 bg-zinc-900/70 text-zinc-400 backdrop-blur-sm active:scale-95 transition">
        <i data-lucide="pause" class="h-5 w-5"></i>
      </button>
    </div>

    <!-- ======================= COUNTDOWN (mirrored) ======================= -->
    <div id="countdown" class="overlay hidden pointer-events-none">
      <div class="absolute inset-x-0 top-0 h-1/2 grid place-items-center" style="transform: rotate(180deg);">
        <span class="cd-num font-mono text-8xl font-extrabold text-zinc-100 drop-shadow-[0_0_25px_rgba(255,255,255,.25)]"></span>
      </div>
      <div class="absolute inset-x-0 bottom-0 h-1/2 grid place-items-center">
        <span class="cd-num font-mono text-8xl font-extrabold text-zinc-100 drop-shadow-[0_0_25px_rgba(255,255,255,.25)]"></span>
      </div>
    </div>

    <!-- ======================= HOME MENU ======================= -->
    <div id="home" class="overlay hidden items-center justify-center px-6" style="padding-top: var(--safe-t); padding-bottom: var(--safe-b);">
      <div class="anim-in w-full max-w-sm">
        <div class="mb-8 text-center">
          <h1 class="text-6xl font-extrabold tracking-tight text-zinc-50">RALLY</h1>
          <p class="mt-2 text-sm text-zinc-500">Two thumbs. One puck. No mercy.</p>
        </div>

        <!-- players -->
        <div class="space-y-2.5">
          <label class="flex items-center gap-3 rounded-xl border border-zinc-800 bg-zinc-900/60 px-4 py-3">
            <span class="h-3 w-3 shrink-0 rounded-full" style="background: var(--p1); box-shadow: 0 0 10px var(--p1);"></span>
            <input id="name1" type="text" maxlength="12" autocomplete="off" autocapitalize="words" spellcheck="false"
              class="w-full bg-transparent text-base font-semibold text-zinc-100 placeholder-zinc-600 outline-none" placeholder="Player 1" />
            <span class="font-mono text-xs text-zinc-500">bottom</span>
          </label>
          <label class="flex items-center gap-3 rounded-xl border border-zinc-800 bg-zinc-900/60 px-4 py-3">
            <span class="h-3 w-3 shrink-0 rounded-full" style="background: var(--p2); box-shadow: 0 0 10px var(--p2);"></span>
            <input id="name2" type="text" maxlength="12" autocomplete="off" autocapitalize="words" spellcheck="false"
              class="w-full bg-transparent text-base font-semibold text-zinc-100 placeholder-zinc-600 outline-none" placeholder="Player 2" />
            <span class="font-mono text-xs text-zinc-500">top</span>
          </label>
        </div>

        <!-- lifetime tally -->
        <div class="mt-4 flex items-center justify-center gap-4 text-sm">
          <span class="font-mono font-bold tabular-nums" style="color: var(--p1);"><span id="life1">0</span></span>
          <span class="text-xs uppercase tracking-widest text-zinc-600">lifetime</span>
          <span class="font-mono font-bold tabular-nums" style="color: var(--p2);"><span id="life2">0</span></span>
        </div>

        <!-- primary actions -->
        <div class="mt-7 space-y-3">
          <button id="resumeBtn"
            class="hidden w-full items-center justify-center gap-2 rounded-xl border border-zinc-700 bg-zinc-800/80 px-5 py-4 text-base font-semibold text-zinc-100 active:scale-[.99] transition">
            <i data-lucide="rotate-cw" class="h-5 w-5"></i>
            <span>Resume match</span>
          </button>
          <button id="playBtn"
            class="flex w-full items-center justify-center gap-2 rounded-xl bg-emerald-400 px-5 py-4 text-base font-bold text-emerald-950 shadow-[0_0_30px_-8px] shadow-emerald-400/60 active:scale-[.99] transition hover:bg-emerald-300 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-400">
            <i data-lucide="play" class="h-5 w-5"></i>
            <span id="playLabel">New match</span>
          </button>
        </div>

        <!-- secondary row -->
        <div class="mt-4 flex items-center justify-center gap-6 text-sm text-zinc-500">
          <button id="settingsToggle" class="flex items-center gap-1.5 py-1 active:text-zinc-300 transition">
            <i data-lucide="settings" class="h-4 w-4"></i><span>Settings</span>
          </button>
          <button id="newGameBtn" class="hidden items-center gap-1.5 py-1 active:text-zinc-300 transition">
            <i data-lucide="rotate-ccw" class="h-4 w-4"></i><span>Reset series</span>
          </button>
        </div>

        <!-- settings panel -->
        <div id="settingsPanel" class="hidden mt-4 space-y-4 rounded-xl border border-zinc-800 bg-zinc-900/60 p-4 anim-in">
          <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-zinc-300">Sound</span>
            <button id="soundToggle" role="switch" aria-checked="true"
              class="relative h-7 w-12 rounded-full bg-emerald-400 transition-colors">
              <span class="absolute left-0.5 top-0.5 h-6 w-6 rounded-full bg-zinc-950 transition-transform translate-x-5"></span>
            </button>
          </div>

          <div>
            <div class="mb-2 text-sm font-medium text-zinc-300">Speed</div>
            <div id="speedSeg" class="grid grid-cols-3 gap-1 rounded-lg border border-zinc-800 bg-zinc-950 p-1">
              <button data-speed="chill" class="seg rounded-md py-2 text-sm font-semibold text-zinc-400">Chill</button>
              <button data-speed="normal" class="seg rounded-md py-2 text-sm font-semibold text-zinc-400">Normal</button>
              <button data-speed="fast" class="seg rounded-md py-2 text-sm font-semibold text-zinc-400">Fast</button>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-zinc-300">Goals per round</span>
            <div class="flex items-center gap-3">
              <button data-step="goals" data-dir="-1" class="grid h-11 w-11 place-items-center rounded-lg border border-zinc-800 bg-zinc-950 text-zinc-300 active:scale-95 transition"><i data-lucide="minus" class="h-4 w-4"></i></button>
              <span id="goalsVal" class="w-6 text-center font-mono text-lg font-bold tabular-nums">5</span>
              <button data-step="goals" data-dir="1" class="grid h-11 w-11 place-items-center rounded-lg border border-zinc-800 bg-zinc-950 text-zinc-300 active:scale-95 transition"><i data-lucide="plus" class="h-4 w-4"></i></button>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-zinc-300">Series (best of)</span>
            <div class="flex items-center gap-3">
              <button data-step="series" data-dir="-2" class="grid h-11 w-11 place-items-center rounded-lg border border-zinc-800 bg-zinc-950 text-zinc-300 active:scale-95 transition"><i data-lucide="minus" class="h-4 w-4"></i></button>
              <span id="seriesVal" class="w-6 text-center font-mono text-lg font-bold tabular-nums">3</span>
              <button data-step="series" data-dir="2" class="grid h-11 w-11 place-items-center rounded-lg border border-zinc-800 bg-zinc-950 text-zinc-300 active:scale-95 transition"><i data-lucide="plus" class="h-4 w-4"></i></button>
            </div>
          </div>

          <button id="wipeBtn" class="flex w-full items-center justify-center gap-1.5 pt-1 text-xs text-zinc-600 active:text-red-400 transition">
            <i data-lucide="trash-2" class="h-3.5 w-3.5"></i><span>Erase all saved data</span>
          </button>
        </div>

        <p class="mt-8 text-center text-xs text-zinc-600">Lay the phone flat on the table between you.</p>
      </div>
    </div>

    <!-- ======================= PAUSE ======================= -->
    <div id="pause" class="overlay hidden items-center justify-center bg-zinc-950/80 backdrop-blur-sm px-6">
      <div class="anim-in w-full max-w-xs text-center">
        <h2 class="text-2xl font-bold text-zinc-100">Paused</h2>
        <div class="mt-6 space-y-3">
          <button id="resumePlayBtn" class="flex w-full items-center justify-center gap-2 rounded-xl bg-emerald-400 px-5 py-4 text-base font-bold text-emerald-950 active:scale-[.99] transition">
            <i data-lucide="play" class="h-5 w-5"></i><span>Resume</span>
          </button>
          <button id="quitBtn" class="flex w-full items-center justify-center gap-2 rounded-xl border border-zinc-800 bg-zinc-900/60 px-5 py-4 text-base font-semibold text-zinc-300 active:scale-[.99] transition">
            <i data-lucide="home" class="h-5 w-5"></i><span>Quit to menu</span>
          </button>
        </div>
        <p class="mt-4 text-xs text-zinc-600">Your match is saved automatically.</p>
      </div>
    </div>

    <!-- ======================= ROUND OVER (mirrored banners) ======================= -->
    <div id="roundover" class="overlay hidden">
      <div class="absolute inset-x-0 top-0 flex h-1/2 items-center justify-center px-6" style="transform: rotate(180deg);">
        <div class="ro-card"></div>
      </div>
      <div class="absolute inset-x-0 bottom-0 flex h-1/2 items-center justify-center px-6">
        <div class="ro-card"></div>
      </div>
      <button id="nextRoundBtn"
        class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center gap-2 rounded-full bg-zinc-100 px-6 py-3 text-sm font-bold text-zinc-950 shadow-lg active:scale-95 transition">
        <i data-lucide="chevron-right" class="h-4 w-4"></i><span>Next round</span>
      </button>
    </div>

    <!-- ======================= SERIES OVER / WIN ======================= -->
    <div id="win" class="overlay hidden">
      <div class="absolute inset-x-0 top-0 flex h-1/2 items-center justify-center px-6" style="transform: rotate(180deg);">
        <div class="win-card"></div>
      </div>
      <div class="absolute inset-x-0 bottom-0 flex h-1/2 items-center justify-center px-6">
        <div class="win-card"></div>
      </div>
      <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col gap-3">
        <button id="rematchBtn"
          class="flex items-center justify-center gap-2 rounded-full bg-emerald-400 px-7 py-3.5 text-base font-bold text-emerald-950 shadow-[0_0_30px_-8px] shadow-emerald-400/60 active:scale-95 transition">
          <i data-lucide="swords" class="h-5 w-5"></i><span>Rematch</span>
        </button>
        <button id="winHomeBtn"
          class="flex items-center justify-center gap-2 rounded-full border border-zinc-700 bg-zinc-900/70 px-7 py-3 text-sm font-semibold text-zinc-300 backdrop-blur-sm active:scale-95 transition">
          <i data-lucide="home" class="h-4 w-4"></i><span>Menu</span>
        </button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
